<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>早读音浪球 | 萌宠球球 · 声控跳跃</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', 'Comic Neue', 'Chalkboard SE', 'Poppins', cursive;
            background: #4c9f3b;
        }

        /* 主画布容器 */
        .world {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(145deg, #9ad7f0 0%, #64b9df 100%);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        /* UI 控制栏 */
        .sound-bar {
            position: fixed;
            bottom: 22px;
            right: 22px;
            z-index: 100;
            background: rgba(255, 245, 200, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 8px 20px;
            display: flex;
            gap: 16px;
            align-items: center;
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.2);
            border: 2px solid #ffd966;
            font-weight: bold;
            pointer-events: auto;
        }

        .mic-button {
            background: #6fbf4c;
            border: none;
            padding: 6px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 3px 0 #3f722a;
            transition: 0.08s linear;
        }

        .mic-button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #3f722a;
        }

        .volume-meter {
            background: #2f382b;
            color: #fff1b5;
            padding: 5px 16px;
            border-radius: 32px;
            min-width: 108px;
            text-align: center;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            font-weight: bold;
        }

        .title-note {
            position: fixed;
            top: 18px;
            left: 18px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            color: #fff3cf;
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: bold;
            z-index: 99;
            pointer-events: none;
            font-family: monospace;
            border-left: 4px solid #ffbc3c;
        }

        @media (max-width: 600px) {
            .sound-bar { bottom: 12px; right: 12px; padding: 5px 12px; gap: 8px; }
            .mic-button { padding: 4px 12px; font-size: 0.7rem; }
            .volume-meter { min-width: 70px; font-size: 0.7rem; padding: 3px 8px; }
            .title-note { font-size: 0.65rem; top: 12px; left: 12px; }
        }

        /* 临时提示 */
        .toast-msg {
            position: fixed;
            bottom: 28%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            color: #fff3b7;
            padding: 8px 22px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: bold;
            z-index: 200;
            white-space: nowrap;
            pointer-events: none;
            transition: opacity 0.2s;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="world">
    <canvas id="petCanvas" width="1000" height="700"></canvas>
    <div class="sound-bar">
        <button class="mic-button" id="enableMicBtn">🎤 开启音浪</button>
        <div class="volume-meter" id="volIndicator">🔊 音量 0%</div>
    </div>
    <div class="title-note">
        📖 早读音浪球 · 大声朗读 ↗ 萌宠球球飞高高 &nbsp;|&nbsp; 🤫 安静时 球球乖乖降落草地 🐾
    </div>
</div>
<div id="toastMsg" class="toast-msg" style="opacity:0;">✨ 音浪越强，球球跳得越高！</div>

<script>
    (function(){
        // ----- 画布元素 -----
        const canvas = document.getElementById('petCanvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = window.innerHeight;
        let grassBaseY = 0;          // 草地站立线 (Y坐标)
        
        // ----- 萌宠球球参数 -----
        const BALL_COUNT = 16;        // 一大堆可爱的萌宠球！
        let balls = [];               // 存储每个球的数据
        
        // ----- 动画状态 -----
        let isFalling = true;         // 是否还在执行从天而降的动画
        let fallProgress = 0;         // 0 → 1 完成降落
        let fallStartTime = 0;
        const FALL_DURATION = 1000;   // ms 降落动画时长
        
        // ----- 音量相关 -----
        let isMicActive = false;
        let audioContext = null;
        let mediaStream = null;
        let sourceNode = null;
        let analyserNode = null;
        let smoothVolume = 0.0;        // 0~1 平滑音量
        let volumeLoopId = null;
        
        // 跳跃映射: 音量越大跳得越高 (向上偏移量 负值)
        const MAX_JUMP = -74;          // 最大跳跃高度(px) 向上
        const MIN_JUMP = -2;
        
        // 安静阈值 (音量小于此值，球球稳定降落回草地)
        const QUIET_THRESHOLD = 0.12;
        let lastQuietFlag = false;
        
        // UI 元素
        const micBtn = document.getElementById('enableMicBtn');
        const volDisplay = document.getElementById('volIndicator');
        const toastDiv = document.getElementById('toastMsg');
        
        // 辅助显示浮层
        let toastTimer = null;
        function showMessage(msg, duration = 1600) {
            if(toastTimer) clearTimeout(toastTimer);
            toastDiv.innerText = msg;
            toastDiv.style.opacity = '1';
            toastTimer = setTimeout(() => {
                toastDiv.style.opacity = '0';
            }, duration);
        }
        
        // ----- 画布自适应 -----
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            // 草地基准线 (屏幕约72% 高度处)
            grassBaseY = height * 0.72;
            // 更新所有球的基准Y (落地线)
            for(let i=0; i<balls.length; i++) {
                balls[i].baseY = grassBaseY - 10;  // 稍调整让球完美站草上
                // 如果降落已完成，则保持当前偏移不变，但重置偏移在音量控制中更新
            }
        }
        
        // ----- 萌宠球球类定义 (带表情和个性小耳朵)-----
        class CuteBall {
            constructor(id, x, baseY, radius, color, faceEmoji, earStyle) {
                this.id = id;
                this.x = x;                 // 水平坐标
                this.baseY = baseY;         // 静止时脚底/中心基线Y  (球心位置基于此)
                this.radius = radius;       // 半径
                this.color = color;
                this.face = faceEmoji;
                this.earStyle = earStyle;   // 简单区分耳朵 "cat", "bear", "bunny"
                // 动态属性
                this.jumpOffset = 0;         // 基于音量的跳跃偏移（负值向上）
                this.fallAnimOffset = 0;     // 从天而降过程中的偏移量 (下降动画专用)
            }
        }
        
        // 生成可爱的球球们 (随机水平位置，不同大小和表情)
        const colorPalette = ["#FFB347","#FF6B6B","#4ECDC4","#FFE66D","#FF9F1C","#D4A5A5","#9B5DE5","#F15BB5","#00BBF9","#6C9EBF","#E59B6D","#A1DE93","#FBC8B5","#C09BD8"];
        const faceLibrary = ["😊","🥰","😆","😜","🤪","😇","😍","🥺","😎","🤗","🐣","🐼","🐶","🐱","🦊","🐸","🐨","🐰"];
        const earTypes = ["cat","bear","bunny","dog"];
        
        function initBalls() {
            const ballsArr = [];
            const marginX = 55;
            const stepX = (width - marginX * 2) / (BALL_COUNT - 1);
            for(let i=0; i<BALL_COUNT; i++) {
                let x = marginX + i * stepX;
                // 增加随机偏移，让排列不那么死板
                x += (Math.random() - 0.5) * 36;
                x = Math.min(width - 55, Math.max(50, x));
                const radius = 22 + Math.random() * 9;  // 半径 22~31
                const color = colorPalette[i % colorPalette.length];
                const face = faceLibrary[i % faceLibrary.length];
                const earStyle = earTypes[i % earTypes.length];
                const baseY = grassBaseY - 10;
                ballsArr.push(new CuteBall(i, x, baseY, radius, color, face, earStyle));
            }
            return ballsArr;
        }
        
        // ----- 绘制一个萌宠球 (带耳朵，眼睛，表情) -----
        function drawBall(ball, yOffset) {
            // yOffset 是相对于 baseY 的偏移量（跳跃或降落偏移）
            const { x, baseY, radius, color, face, earStyle } = ball;
            const centerX = x;
            const centerY = baseY + yOffset - radius * 0.3; // 让球看起来站在草上，重心微调
            const r = radius;
            
            ctx.save();
            ctx.shadowColor = "rgba(0,0,0,0.18)";
            ctx.shadowBlur = 7;
            // 绘制身体圆形
            ctx.beginPath();
            ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = "#E27C2C";
            ctx.lineWidth = 1.8;
            ctx.stroke();
            // 肚皮光晕
            ctx.beginPath();
            ctx.ellipse(centerX, centerY + r*0.15, r*0.6, r*0.5, 0, 0, Math.PI*2);
            ctx.fillStyle = "rgba(255,240,180,0.55)";
            ctx.fill();
            
            // 耳朵根据不同风格绘制
            const earW = r * 0.65;
            const earH = r * 0.75;
            ctx.fillStyle = color;
            if(earStyle === "cat") {
                // 猫耳三角形
                ctx.beginPath(); ctx.moveTo(centerX - r*0.65, centerY - r*0.85); ctx.lineTo(centerX - r*1.1, centerY - r*1.3); ctx.lineTo(centerX - r*0.25, centerY - r*0.95); ctx.fill();
                ctx.beginPath(); ctx.moveTo(centerX + r*0.65, centerY - r*0.85); ctx.lineTo(centerX + r*1.1, centerY - r*1.3); ctx.lineTo(centerX + r*0.25, centerY - r*0.95); ctx.fill();
                ctx.fillStyle = "#FFCD94";
                ctx.beginPath(); ctx.arc(centerX - r*0.75, centerY - r*1.0, r*0.22, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(centerX + r*0.75, centerY - r*1.0, r*0.22, 0, Math.PI*2); ctx.fill();
            } else if(earStyle === "bear") {
                ctx.beginPath(); ctx.ellipse(centerX - r*0.7, centerY - r*0.8, r*0.45, r*0.6, 0, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(centerX + r*0.7, centerY - r*0.8, r*0.45, r*0.6, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#EFB87E";
                ctx.beginPath(); ctx.ellipse(centerX - r*0.65, centerY - r*0.75, r*0.27, r*0.38, 0, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(centerX + r*0.65, centerY - r*0.75, r*0.27, r*0.38, 0, 0, Math.PI*2); ctx.fill();
            } else if(earStyle === "bunny") {
                ctx.fillStyle = "#F2DEB3";
                ctx.beginPath(); ctx.ellipse(centerX - r*0.72, centerY - r*1.05, r*0.38, r*0.9, -0.2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(centerX + r*0.72, centerY - r*1.05, r*0.38, r*0.9, 0.2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#FFF0D6";
                ctx.beginPath(); ctx.ellipse(centerX - r*0.65, centerY - r*1.0, r*0.27, r*0.68, -0.1, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(centerX + r*0.65, centerY - r*1.0, r*0.27, r*0.68, 0.1, 0, Math.PI*2); ctx.fill();
            } else {
                // 小狗圆耳朵
                ctx.beginPath(); ctx.ellipse(centerX - r*0.7, centerY - r*0.75, r*0.5, r*0.55, 0, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(centerX + r*0.7, centerY - r*0.75, r*0.5, r*0.55, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#E6B77A";
                ctx.beginPath(); ctx.ellipse(centerX - r*0.65, centerY - r*0.72, r*0.28, r*0.32, 0, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(centerX + r*0.65, centerY - r*0.72, r*0.28, r*0.32, 0, 0, Math.PI*2); ctx.fill();
            }
            
            // 眼睛 (小白底)
            const eyeRad = r * 0.22;
            const eyeXOffset = r * 0.45;
            const eyeY = centerY - r * 0.1;
            ctx.fillStyle = "#FFFFFF";
            ctx.beginPath(); ctx.arc(centerX - eyeXOffset, eyeY, eyeRad, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(centerX + eyeXOffset, eyeY, eyeRad, 0, Math.PI*2); ctx.fill();
            // 瞳孔
            ctx.fillStyle = "#2D2C3A";
            ctx.beginPath(); ctx.arc(centerX - eyeXOffset + 2, eyeY - 1, eyeRad*0.55, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(centerX + eyeXOffset + 2, eyeY - 1, eyeRad*0.55, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(centerX - eyeXOffset + 1, eyeY - 2, eyeRad*0.25, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(centerX + eyeXOffset + 1, eyeY - 2, eyeRad*0.25, 0, Math.PI*2); ctx.fill();
            // 腮红
            ctx.fillStyle = "#FFAAAF";
            ctx.beginPath(); ctx.ellipse(centerX - r*0.65, eyeY + 3, r*0.16, r*0.11, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(centerX + r*0.65, eyeY + 3, r*0.16, r*0.11, 0, 0, Math.PI*2); ctx.fill();
            // 微笑大眼睛
            ctx.beginPath();
            ctx.arc(centerX, centerY + r*0.25, r*0.32, 0.08, Math.PI - 0.08);
            ctx.strokeStyle = "#693C1C";
            ctx.lineWidth = 2.2;
            ctx.stroke();
            // 头顶大表情
            ctx.font = `${Math.floor(24 * (r/24))}px "Segoe UI Emoji", "Apple Color Emoji"`;
            ctx.fillStyle = "#2E2B1F";
            ctx.shadowBlur = 2;
            ctx.fillText(face, centerX - 12, centerY - r - 6);
            // 小脚脚
            ctx.fillStyle = "#E17C2C";
            ctx.beginPath(); ctx.ellipse(centerX - r*0.55, centerY + r*0.75, r*0.28, r*0.16, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(centerX + r*0.55, centerY + r*0.75, r*0.28, r*0.16, 0, 0, Math.PI*2); ctx.fill();
            
            ctx.restore();
        }
        
        // ----- 背景绘制 (蔚蓝天空+绿草地+云)-----
        function drawBackground() {
            // 天空渐变
            const grad = ctx.createLinearGradient(0, 0, 0, height*0.7);
            grad.addColorStop(0, "#B2E1FA");
            grad.addColorStop(1, "#D9F2FF");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
            // 云朵
            ctx.fillStyle = "rgba(255,255,250,0.92)";
            drawCloud(70, 70, 65);
            drawCloud(width - 130, 100, 78);
            drawCloud(width * 0.25, 145, 72);
            drawCloud(width * 0.7, 55, 80);
            drawCloud(width * 0.45, 190, 60);
            // 绿油油草地 (立体层次)
            ctx.fillStyle = "#8BC34A";
            ctx.fillRect(0, grassBaseY - 14, width, height - grassBaseY + 20);
            ctx.fillStyle = "#6DA53A";
            for(let i=0;i<35;i++) {
                ctx.beginPath();
                ctx.moveTo(i*48, grassBaseY - 12);
                ctx.quadraticCurveTo(i*48+25, grassBaseY - 34, i*48+48, grassBaseY - 14);
                ctx.fill();
            }
            // 小花花装饰
            ctx.fillStyle = "#FFE484";
            for(let i=0;i<50;i++) {
                let fx = (i*37) % width;
                ctx.beginPath(); ctx.arc(fx, grassBaseY-7, 3.5, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#FFB347";
                ctx.beginPath(); ctx.arc(fx-2, grassBaseY-11, 2.2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#FFE484";
            }
        }
        
        function drawCloud(x, y, r) {
            ctx.beginPath();
            ctx.ellipse(x, y, r, r*0.65, 0, 0, Math.PI*2);
            ctx.ellipse(x-38, y-12, r*0.7, r*0.55, 0, 0, Math.PI*2);
            ctx.ellipse(x+38, y-10, r*0.68, r*0.6, 0, 0, Math.PI*2);
            ctx.fill();
        }
        
        // ----- 从天而降动画更新 (基于时间) -----
        function updateFallAnimation(now) {
            if(!isFalling) return;
            if(fallStartTime === 0) fallStartTime = now;
            let elapsed = now - fallStartTime;
            let t = Math.min(1.0, elapsed / FALL_DURATION);
            fallProgress = t;
            // 更新每个球的fallAnimOffset (从顶部动态降落)
            for(let i=0; i<balls.length; i++) {
                let startY = -80 - (i%3)*15;  // 起始位置不同更加可爱
                let targetY = 0;  // 相对偏移为0表示基准线
                let currentYOffset = startY + (targetY - startY) * t;
                balls[i].fallAnimOffset = currentYOffset;
            }
            if(t >= 1.0) {
                isFalling = false;
                // 将fallAnimOffset归零，完全落地
                for(let i=0; i<balls.length; i++) balls[i].fallAnimOffset = 0;
                // 降落完成, 如果当前音量低于阈值且麦克风开启，显示安静提示(可选)
                if(isMicActive && smoothVolume < QUIET_THRESHOLD) {
                    showMessage("🌱 安静阅读，萌宠球球轻轻降落草地 ~", 1500);
                } else if(isMicActive) {
                    showMessage("🎉 音浪球球准备就绪！大声朗读让它们跳起来！", 1800);
                }
            }
        }
        
        // ----- 音量映射: 获得每个球基于音量的跳跃偏移 (个体差异) -----
        function updateVolumeJump() {
            if(!isMicActive || isFalling) {
                // 未开启麦克风或还在降落中，无音量跳跃
                for(let i=0; i<balls.length; i++) balls[i].jumpOffset = 0;
                return;
            }
            // 根据平滑音量计算跳跃高度 (0→1)
            let normVol = Math.min(1.0, Math.max(0.0, smoothVolume));
            let jumpHeight = MIN_JUMP + normVol * (MAX_JUMP - MIN_JUMP); // 负值
            // 如果音量低于阈值则回归草地 (jumpOffset 归零)
            let isQuiet = normVol < QUIET_THRESHOLD;
            let finalJump = isQuiet ? 0 : jumpHeight;
            // 给每个球个体差异 (±20%), 让跳跃不那么整齐更生动
            for(let i=0; i<balls.length; i++) {
                let factor = 0.85 + (i % 7) * 0.05;  // 0.85~1.15
                let individualJump = finalJump * factor;
                balls[i].jumpOffset = individualJump;
            }
            // 安静→非安静或者反之触发微提示但避免频繁
            if(lastQuietFlag !== isQuiet && !isFalling) {
                if(isQuiet && isMicActive) {
                    showMessage("🦋 声音变小，球球们轻柔降落草地～", 1100);
                } else if(!isQuiet && isMicActive && normVol > 0.2) {
                    showMessage("📣 音量飙升！萌宠球球兴奋跳跃 🎈", 1000);
                }
            }
            lastQuietFlag = isQuiet;
        }
        
        // 获取每一帧每个球的总偏移 (降落偏移 + 音量跳跃偏移)
        function getTotalOffset(ball) {
            if(isFalling) {
                // 处于降落动画中，仅使用 fallAnimOffset
                return ball.fallAnimOffset;
            } else {
                // 降落完成: 跳跃偏移 + 微小的弹性余韵(免抖)
                return ball.jumpOffset;
            }
        }
        
        // ----- 渲染主循环 -----
        function render() {
            if(!width || !height) return;
            drawBackground();
            // 绘制所有萌宠球
            for(let i=0; i<balls.length; i++) {
                const ball = balls[i];
                let offset = getTotalOffset(ball);
                drawBall(ball, offset);
            }
            requestAnimationFrame(render);
        }
        
        // ----- 麦克风音量检测 (Web Audio) -----
        async function initMicrophone() {
            if(audioContext && audioContext.state !== 'closed') {
                closeAudio();
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaStream = stream;
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyserNode = audioContext.createAnalyser();
                analyserNode.fftSize = 256;
                sourceNode = audioContext.createMediaStreamSource(stream);
                sourceNode.connect(analyserNode);
                if(audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
                isMicActive = true;
                micBtn.textContent = "🎙️ 音浪ON";
                showMessage("🎤 麦克风已启用！大声朗读 → 萌宠球球跳得高高！", 2000);
                startVolumePolling();
            } catch(err) {
                console.warn(err);
                showMessage("❌ 无法获取麦克风权限，请检查并刷新允许麦克风", 2800);
                isMicActive = false;
                micBtn.textContent = "🎤 开启音浪";
            }
        }
        
        function startVolumePolling() {
            if(volumeLoopId) cancelAnimationFrame(volumeLoopId);
            if(!analyserNode) return;
            const dataArray = new Uint8Array(analyserNode.frequencyBinCount);
            function poll() {
                if(!isMicActive || !analyserNode) {
                    smoothVolume = 0;
                    volDisplay.innerText = `🔊 音量 0%`;
                    updateVolumeJump();
                    volumeLoopId = requestAnimationFrame(poll);
                    return;
                }
                analyserNode.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                let avg = sum / (dataArray.length || 1);
                let rawNorm = Math.min(1.0, avg / 170);  // 170阈值适应喊叫
                smoothVolume = smoothVolume * 0.65 + rawNorm * 0.35; // 平滑跟随
                let percent = Math.floor(smoothVolume * 100);
                volDisplay.innerText = `🔊 音量 ${percent}%`;
                updateVolumeJump();   // 实时更新每个球的跳跃偏移
                volumeLoopId = requestAnimationFrame(poll);
            }
            poll();
        }
        
        function closeAudio() {
            if(volumeLoopId) cancelAnimationFrame(volumeLoopId);
            if(sourceNode) try{ sourceNode.disconnect(); }catch(e){}
            if(analyserNode) try{ analyserNode.disconnect(); }catch(e){}
            if(audioContext) { audioContext.close().catch(e=>{}); audioContext = null; }
            if(mediaStream) { mediaStream.getTracks().forEach(track => track.stop()); mediaStream = null; }
            isMicActive = false;
            smoothVolume = 0;
            if(volDisplay) volDisplay.innerText = `🔊 音量 0%`;
            for(let i=0; i<balls.length; i++) balls[i].jumpOffset = 0;
            micBtn.textContent = "🎤 开启音浪";
            lastQuietFlag = false;
        }
        
        micBtn.addEventListener('click', () => {
            if(isMicActive) {
                closeAudio();
                showMessage("🔇 麦克风已关闭，球球们优雅站立~", 1200);
            } else {
                initMicrophone();
            }
        });
        
        // ----- 窗口resize 重新适配 -----
        function handleResize() {
            resizeCanvas();
            // 重新调整所有球的x位置和基准Y，避免边界超出
            const marginX = 55;
            const stepX = (width - marginX * 2) / (BALL_COUNT - 1);
            for(let i=0; i<balls.length; i++) {
                let newX = marginX + i * stepX;
                newX += (Math.sin(i) * 12);
                newX = Math.min(width - 50, Math.max(45, newX));
                balls[i].x = newX;
                balls[i].baseY = grassBaseY - 10;
                if(isFalling) {
                    // 重置下落偏移中相对起始位置微调
                    balls[i].fallAnimOffset = balls[i].fallAnimOffset || 0;
                } else {
                    balls[i].jumpOffset = 0;
                }
            }
        }
        
        // ----- 初始化世界 -----
        function initWorld() {
            resizeCanvas();
            balls = initBalls();
            // 重置动画状态
            isFalling = true;
            fallProgress = 0;
            fallStartTime = 0;
            lastQuietFlag = false;
            smoothVolume = 0;
            if(isMicActive) closeAudio(); // 重置音频状态
            isMicActive = false;
            micBtn.textContent = "🎤 开启音浪";
            // 开始降落动画 (通过 requestAnimationFrame 循环更新)
            function fallLoop(now) {
                updateFallAnimation(now);
                requestAnimationFrame(fallLoop);
            }
            requestAnimationFrame(fallLoop);
            // 开启渲染
            render();
            window.addEventListener('resize', () => {
                handleResize();
            });
        }
        
        initWorld();
    })();
</script>
